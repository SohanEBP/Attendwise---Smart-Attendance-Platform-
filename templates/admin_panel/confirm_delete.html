{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="aw-card text-center p-5">
      <div style="font-size:56px;margin-bottom:16px;">🗑️</div>
      <h4 class="fw-700 mb-2">Are you sure?</h4>
      <p class="text-muted mb-4">You are about to delete <strong>{{ object }}</strong>. This action cannot be undone.</p>
      <form method="POST">
        {% csrf_token %}
        <div class="d-flex gap-3 justify-content-center">
          <button type="submit" class="btn btn-danger px-4 fw-600">
            <i class="bi bi-trash me-1"></i> Yes, Delete
          </button>
          <a href="{% url back_url %}" class="btn-outline-aw">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

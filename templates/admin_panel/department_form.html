{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <a href="{% url 'manage_departments' %}" class="btn-outline-aw mb-4"><i class="bi bi-arrow-left"></i> Back</a>
    <div class="form-section">
      <h5 class="fw-700 mb-4">{{ title }}</h5>
      <form method="POST">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-8"><label class="form-label">Department Name</label>{{ form.name }}</div>
          <div class="col-md-4"><label class="form-label">Code</label>{{ form.code }}</div>
          <div class="col-12"><label class="form-label">Description</label>{{ form.description }}</div>
        </div>
        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="btn-primary-aw"><i class="bi bi-check2"></i> Save</button>
          <a href="{% url 'manage_departments' %}" class="btn-outline-aw">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

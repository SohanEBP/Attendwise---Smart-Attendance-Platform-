{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – AttendWise</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/main.css' %}" rel="stylesheet">
  <style>
    body { background:linear-gradient(135deg,#1e1b4b,#312e81); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { border-radius:20px; padding:40px; max-width:420px; width:100%; box-shadow:0 32px 80px rgba(0,0,0,.35); }
  </style>
</head>
<body>
<div class="card fade-in-up">
  <div class="text-center mb-4">
    <div style="font-size:48px;">🔑</div>
    <h2 class="fw-800 mb-1">Forgot Password?</h2>
    <p class="text-muted" style="font-size:14px;">Enter your email and we'll send you a reset link.</p>
  </div>
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-info" style="font-size:14px;">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-600">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>
    <button type="submit" class="btn w-100 py-2 fw-700" style="background:#4f46e5;color:#fff;border-radius:10px;">
      Send Reset Link
    </button>
  </form>
  <p class="text-center mt-3 mb-0" style="font-size:14px;">
    <a href="{% url 'login' %}" style="color:#4f46e5;">← Back to Login</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

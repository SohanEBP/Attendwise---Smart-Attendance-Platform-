{% extends 'base_public.html' %}
{% block title %}Contact{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <h1 class="fw-800 mb-2">Get in Touch</h1>
      <p class="text-muted mb-5">Have questions? We'd love to hear from you.</p>
      <div class="aw-card">
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Your Name</label>
              <input type="text" name="name" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Subject</label>
              <input type="text" name="subject" class="form-control" placeholder="How can we help?">
            </div>
            <div class="mb-4">
              <label class="form-label">Message</label>
              <textarea name="message" class="form-control" rows="5" placeholder="Your message..." required></textarea>
            </div>
            <button type="submit" class="btn-primary-aw w-100 justify-content-center py-2">
              <i class="bi bi-send"></i> Send Message
            </button>
          </form>
        </div>
      </div>
      <div class="row g-3 mt-4">
        <div class="col-4">
          <div class="text-center p-3 rounded-3 border">
            <div class="fs-4 mb-1">📧</div>
            <div style="font-size:12px;color:#64748b;">hello@attendwise.com</div>
          </div>
        </div>
        <div class="col-4">
          <div class="text-center p-3 rounded-3 border">
            <div class="fs-4 mb-1">📞</div>
            <div style="font-size:12px;color:#64748b;">+1 (555) 000-1234</div>
          </div>
        </div>
        <div class="col-4">
          <div class="text-center p-3 rounded-3 border">
            <div class="fs-4 mb-1">📍</div>
            <div style="font-size:12px;color:#64748b;">San Francisco, CA</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
